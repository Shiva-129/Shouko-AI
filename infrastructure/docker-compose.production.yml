version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: shouko-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shouko}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-shouko}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shouko} -d ${POSTGRES_DB:-shouko}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shouko-network

  redis:
    image: redis:7-alpine
    container_name: shouko-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shouko-network

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.api
    container_name: shouko-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      APP_SECRET_KEY: ${APP_SECRET_KEY:?APP_SECRET_KEY is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - shouko-network

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.celery
    container_name: shouko-worker
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      APP_SECRET_KEY: ${APP_SECRET_KEY:?APP_SECRET_KEY is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A core.celery_app inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - shouko-network

  beat:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.celery
    container_name: shouko-beat
    restart: unless-stopped
    command: ["celery", "-A", "core.celery_app", "beat", "--loglevel=info"]
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      APP_SECRET_KEY: ${APP_SECRET_KEY:?APP_SECRET_KEY is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shouko-network

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: shouko-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - shouko-network

volumes:
  pgdata:
  redisdata:

networks:
  shouko-network:
    driver: bridge
