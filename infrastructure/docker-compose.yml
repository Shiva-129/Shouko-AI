version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: paperbrain-db
    restart: always
    environment:
      POSTGRES_USER: paperbrain
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: paperbrain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperbrain -d paperbrain"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: paperbrain-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
