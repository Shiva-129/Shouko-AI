version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: shouko-db
    restart: always
    environment:
      POSTGRES_USER: shouko
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: shouko
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shouko -d shouko"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shouko-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
